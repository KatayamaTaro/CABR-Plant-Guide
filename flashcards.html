<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Plant Study Portal (Max View)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/framer-motion@10.16.4/dist/framer-motion.js"></script>
    <style>
        .perspective { perspective: 2000px; }
        .backface-hidden { backface-visibility: hidden; }
    </style>
</head>
<body class="bg-gray-50 text-gray-800">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;
        const { motion } = window.Motion;

        function FlashcardApp() {
            const [mode, setMode] = useState("edit");
            const [cards, setCards] = useState(() => {
                const saved = localStorage.getItem("plant-cards");
                return saved ? JSON.parse(saved) : [];
            });
            const [answer, setAnswer] = useState("");
            const [image, setImage] = useState("");
            const [currentIndex, setCurrentIndex] = useState(0);
            const [flipped, setFlipped] = useState(false);
            const [editingIndex, setEditingIndex] = useState(null);
            const fileInputRef = useRef(null);

            useEffect(() => {
                localStorage.setItem("plant-cards", JSON.stringify(cards));
            }, [cards]);

            const addOrUpdateCard = () => {
                if (!answer || !image) return;
                if (editingIndex !== null) {
                    const updated = [...cards];
                    updated[editingIndex] = { answer, image };
                    setCards(updated);
                    setEditingIndex(null);
                } else {
                    setCards([...cards, { answer, image }]);
                }
                setAnswer("");
                setImage("");
            };

            const shuffleCards = () => {
                const shuffled = [...cards].sort(() => Math.random() - 0.5);
                setCards(shuffled);
                setCurrentIndex(0);
                setFlipped(false);
            };

            const deleteCard = (index) => {
                if(confirm("Delete this plant?")) {
                    const updated = cards.filter((_, i) => i !== index);
                    setCards(updated);
                }
            };

            const exportLibrary = () => {
                const dataStr = JSON.stringify(cards, null, 2);
                const dataUri = 'data:application/json;charset=utf-8,'+ encodeURIComponent(dataStr);
                const linkElement = document.createElement('a');
                linkElement.setAttribute('href', dataUri);
                linkElement.setAttribute('download', 'plant_library.json');
                linkElement.click();
            };

            const importLibrary = (event) => {
                const file = event.target.files[0];
                if (!file) return;
                const reader = new FileReader();
                reader.onload = (e) => {
                    try {
                        const imported = JSON.parse(e.target.result);
                        if (Array.isArray(imported)) {
                            setCards([...cards, ...imported]);
                        }
                    } catch (err) { alert("Invalid file"); }
                };
                reader.readAsText(file);
            };

            const nextCard = () => { setFlipped(false); setCurrentIndex((prev) => (prev + 1) % cards.length); };
            const prevCard = () => { setFlipped(false); setCurrentIndex((prev) => (prev - 1 + cards.length) % cards.length); };

            return (
                <div className="min-h-screen p-4 md:p-8 flex flex-col items-center w-full max-w-6xl mx-auto">
                    <header className="flex flex-col md:flex-row justify-between w-full items-center mb-8 gap-4">
                        <h1 className="text-4xl font-black text-green-900 tracking-tight">🌿CABR Plant Study Guide</h1>
                        <div className="flex gap-3">
                            <button onClick={exportLibrary} className="text-xs font-bold bg-white border border-gray-200 px-4 py-2 rounded-lg hover:shadow-md transition">Export JSON</button>
                            <button onClick={() => fileInputRef.current.click()} className="text-xs font-bold bg-white border border-gray-200 px-4 py-2 rounded-lg hover:shadow-md transition">Import JSON</button>
                            <input type="file" ref={fileInputRef} onChange={importLibrary} className="hidden" accept=".json" />
                        </div>
                    </header>
                    
                    <nav className="flex gap-2 mb-10 bg-gray-200/50 p-1.5 rounded-2xl">
                        <button className={`px-8 py-3 rounded-xl font-black transition-all ${mode === 'edit' ? 'bg-green-800 text-white shadow-lg scale-105' : 'text-gray-500 hover:bg-gray-200'}`} onClick={() => setMode("edit")}>EDITOR</button>
                        <button className={`px-8 py-3 rounded-xl font-black transition-all ${mode === 'play' ? 'bg-green-800 text-white shadow-lg scale-105' : 'text-gray-500 hover:bg-gray-200'}`} onClick={() => setMode("play")}>STUDY</button>
                    </nav>

                    {mode === "edit" && (
                        <div className="w-full grid md:grid-cols-2 gap-10">
                            <div className="bg-white p-8 rounded-3xl shadow-xl border border-gray-100 h-fit sticky top-8">
                                <h2 className="text-2xl font-bold mb-6 text-green-950 underline decoration-green-300 underline-offset-8">Add Plant</h2>
                                <div className="space-y-5">
                                    <input className="w-full p-4 bg-gray-50 border-2 border-transparent rounded-2xl focus:border-green-500 focus:bg-white outline-none transition-all font-medium" placeholder="Species Name" value={answer} onChange={(e) => setAnswer(e.target.value)} />
                                    <input className="w-full p-4 bg-gray-50 border-2 border-transparent rounded-2xl focus:border-green-500 focus:bg-white outline-none transition-all font-medium text-sm" placeholder="Paste Image URL here..." value={image} onChange={(e) => setImage(e.target.value)} />
                                    <button className="w-full bg-green-800 text-white font-black py-4 rounded-2xl hover:bg-green-900 shadow-xl transition-transform active:scale-[0.98]" onClick={addOrUpdateCard}>
                                        {editingIndex !== null ? "UPDATE PLANT" : "ADD TO COLLECTION"}
                                    </button>
                                </div>
                            </div>
                            
                            <div className="space-y-4">
                                <h2 className="text-2xl font-bold mb-6 text-green-950">Collection ({cards.length})</h2>
                                <div className="grid gap-4">
                                    {cards.map((c, i) => (
                                        <div key={i} className="bg-white p-4 flex justify-between items-center rounded-2xl shadow-sm border border-gray-100 hover:shadow-md transition group">
                                            <div className="flex items-center gap-4">
                                                <img src={c.image} className="w-16 h-16 rounded-xl object-cover bg-gray-100" />
                                                <span className="font-bold text-lg">{c.answer}</span>
                                            </div>
                                            <div className="flex gap-2">
                                                <button className="text-blue-500 font-bold px-3 py-1 rounded-lg hover:bg-blue-50" onClick={() => {setAnswer(c.answer); setImage(c.image); setEditingIndex(i)}}>Edit</button>
                                                <button className="text-red-400 font-bold px-3 py-1 rounded-lg hover:bg-red-50" onClick={() => deleteCard(i)}>Delete</button>
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        </div>
                    )}

                    {mode === "play" && (
                        cards.length > 0 ? (
                            <div className="flex flex-col items-center gap-8 w-full">
                                <div className="w-full max-w-4xl px-4">
                                    <div className="h-3 bg-gray-200 rounded-full mb-3 shadow-inner">
                                        <div className="h-full bg-green-600 transition-all duration-700 rounded-full" style={{width: `${((currentIndex+1)/cards.length)*100}%`}}></div>
                                    </div>
                                    <div className="flex justify-between font-black text-gray-400 text-xs tracking-widest uppercase">
                                        <span>Progress</span>
                                        <span>{currentIndex + 1} / {cards.length}</span>
                                    </div>
                                </div>
                                
                                <div className="perspective w-full max-w-4xl aspect-[16/10] md:aspect-[16/9] cursor-pointer" onClick={() => setFlipped(!flipped)}>
                                    <motion.div 
                                        className="relative w-full h-full"
                                        animate={{ rotateY: flipped ? 180 : 0 }}
                                        transition={{ duration: 0.6, type: "spring", stiffness: 150, damping: 20 }}
                                        style={{ transformStyle: "preserve-3d" }}
                                    >
                                        {/* Front: Big Image */}
                                        <div className="absolute inset-0 backface-hidden bg-white border-[12px] border-white rounded-[3rem] shadow-2xl overflow-hidden flex items-center justify-center">
                                            <img src={cards[currentIndex].image} className="w-full h-full object-contain md:object-cover rounded-2xl" alt="Plant Image" />
                                            <div className="absolute bottom-6 right-8 bg-black/20 backdrop-blur-md text-white px-4 py-2 rounded-full text-xs font-bold uppercase tracking-wider">Click to see name</div>
                                        </div>
                                        {/* Back: Name */}
                                        <div className="absolute inset-0 backface-hidden flex items-center justify-center p-12 text-6xl font-black text-green-950 bg-green-50 rounded-[3.1rem] border-[12px] border-white shadow-2xl" style={{ transform: "rotateY(180deg)" }}>
                                            <span className="text-center drop-shadow-sm">{cards[currentIndex].answer}</span>
                                        </div>
                                    </motion.div>
                                </div>

                                <div className="flex gap-4 w-full max-w-4xl">
                                    <button className="flex-1 py-5 bg-white border-2 border-gray-200 rounded-3xl font-black text-gray-600 hover:bg-gray-50 shadow-sm active:scale-95 transition-all uppercase tracking-wider" onClick={prevCard}>Back</button>
                                    <button className="px-8 py-5 bg-amber-500 text-white rounded-3xl font-black shadow-lg hover:bg-amber-600 active:scale-95 transition-all" title="Shuffle Deck" onClick={shuffleCards}>SHUFFLE</button>
                                    <button className="flex-[2] py-5 bg-green-800 text-white rounded-3xl font-black text-xl shadow-xl hover:bg-green-900 active:scale-95 transition-all uppercase tracking-widest" onClick={nextCard}>Next Plant</button>
                                </div>
                            </div>
                        ) : (
                            <div className="text-center p-20 bg-white rounded-[3rem] shadow-xl border-4 border-dashed border-gray-100">
                                <p className="text-2xl text-gray-300 font-bold">Your herbarium is empty.</p>
                                <button className="mt-4 text-green-700 font-black text-lg underline hover:text-green-900 transition" onClick={() => setMode("edit")}>Add your first species</button>
                            </div>
                        )
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<FlashcardApp />);
    </script>
</body>
</html>
